name: âœ¨ Submit an attractor
description: Share a strange attractor with the phase-space community.
title: "Attractor: "
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## Share your attractor đŸ¦‹

        An attractor here is **pure math, not code** â€” three equations describing how a
        point moves through space. The easiest way to fill this in is the
        **Define attractor â†’ Submit â†—** button inside the app, which pre-fills everything
        below. You can also write it by hand.

        **You can use:** the variables `x` `y` `z` `t`, your own parameters, the constants
        `pi` `e`, the operators `+ âˆ’ Ă— Ă· ^` and parentheses, and the functions
        `sin cos tan exp ln log sqrt abs sign floor sinh cosh tanh atan atan2 min max mod pow`.

        Once you submit, a bot checks the math, renders a preview, and opens a pull request
        for a maintainer to look over. Thanks for contributing! đŸ’«
  - type: input
    id: name
    attributes:
      label: Name
      description: What's it called?
      placeholder: Halvorsen
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Your handle
      description: Credited on the attractor.
      placeholder: your-github-username
    validations:
      required: true
  - type: input
    id: description
    attributes:
      label: One-line description
      placeholder: Cyclically symmetric, quadratic â€” three twisting lobes.
  - type: markdown
    attributes:
      value: "## The equations\nRates of change for each coordinate. Example: `sigma*(y - x)`"
  - type: input
    id: dx
    attributes:
      label: dx/dt
      placeholder: "-a*x - 4*y - 4*z - y^2"
    validations:
      required: true
  - type: input
    id: dy
    attributes:
      label: dy/dt
      placeholder: "-a*y - 4*z - 4*x - z^2"
    validations:
      required: true
  - type: input
    id: dz
    attributes:
      label: dz/dt
      placeholder: "-a*z - 4*x - 4*y - x^2"
    validations:
      required: true
  - type: textarea
    id: params
    attributes:
      label: Parameters
      description: "One per line as `name = default, min, max` (min/max optional). These become sliders."
      placeholder: |
        a = 1.4, 0.5, 3
      render: text
  - type: textarea
    id: seeds
    attributes:
      label: Starting points
      description: "One per line as `x, y, z`. Add a couple of nearby points for a richer picture."
      placeholder: |
        -1.48, -1.51, 2.04
      render: text
  - type: dropdown
    id: license
    attributes:
      label: License
      description: How others may use it. CC0 = public domain.
      options:
        - CC0
        - MIT
        - Other (note it in the description)
      default: 0
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ---
        <sub>The field below is filled automatically by the app and read by the importer â€”
        you can leave it blank if you typed everything in by hand.</sub>
  - type: textarea
    id: manifest
    attributes:
      label: Manifest (auto-filled)
      description: Generated JSON â€” leave as-is.
      render: json
